name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy:
      #   push to main               -> :latest  (+ :sha-<commit>)
      #   push git tag v1.2.3        -> :1.2.3, :1.2, :1  (+ :latest via latest=auto)
      #   push git tag v3.0.0-beta   -> :3.0.0-beta + :beta ONLY.
      # Prerelease tags are safe by construction: metadata-action's
      # latest=auto skips prereleases, and the {{major}}.{{minor}}/{{major}}
      # semver patterns are not generated for prereleases either — so a beta
      # tag can never move :latest / :3 / :2.x. Branch pushes (non-main)
      # trigger nothing.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ contains(github.ref, '-beta') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
