<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Recommender — Configure</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<style>
  :root {
    --bg: #0f1117; --card: #171a23; --card2: #1e222e; --border: #2a2f3d;
    --text: #e6e8ee; --muted: #8b91a3; --accent: #8b5cf6; --accent2: #6d3fe0;
    --ok: #34d399; --warn: #fbbf24; --err: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 22px; margin: 8px 0 2px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 18px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .grow { flex: 1; }
  h2 { font-size: 16px; margin: 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.warn { color: var(--warn); border-color: var(--warn); }
  .badge.err { color: var(--err); border-color: var(--err); }
  label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
  input[type=text], input[type=password], select {
    width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); font-size: 14px; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  button:hover { background: var(--accent2); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  button.ghost:hover { color: var(--text); border-color: var(--muted); }
  button.danger { background: transparent; border: 1px solid var(--err); color: var(--err); }
  button:disabled { opacity: 0.5; cursor: default; }
  .genres { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; margin-top: 6px; }
  .genres label { display: flex; align-items: center; gap: 6px; margin: 0; font-size: 13px; color: var(--text);
    background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; cursor: pointer; }
  .genres label:has(input:checked) { border-color: var(--err); color: var(--err); }
  .install { background: var(--card2); border: 1px dashed var(--border); border-radius: 8px; padding: 10px; font-family: monospace; font-size: 12px; word-break: break-all; margin-top: 6px; }
  .muted { color: var(--muted); font-size: 12px; }
  .status-line { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .diag { font-size: 12px; margin-top: 8px; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: none; }
  .diag div { margin: 2px 0; }
  .pin { font-size: 28px; letter-spacing: 6px; font-weight: 700; color: var(--accent); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px) { .cols { grid-template-columns: 1fr; } }
  details summary { cursor: pointer; color: var(--muted); font-size: 13px; margin: 12px 0 4px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card2); border: 1px solid var(--accent); border-radius: 10px; padding: 10px 18px; font-size: 13px; display: none; }
  .getkey { color: var(--accent); font-size: 11px; text-decoration: none; margin-left: 6px; }
  .getkey:hover { text-decoration: underline; }
  button.mini { padding: 4px 10px; font-size: 12px; }
  .tres { font-size: 12px; margin-left: 8px; }
  .tres.ok { color: var(--ok); }
  .tres.err { color: var(--err); }
  .brand { width: 34px; height: 34px; vertical-align: middle; margin-right: 8px; border-radius: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1><img src="logo.svg" alt="" class="brand">AI Recommender</h1>
  <div class="sub">Admin portal — each section below manages one family member's addon: their keys, Trakt link, filters, and install URL.</div>

  <div class="card">
    <div class="row">
      <input type="text" id="newName" class="grow" placeholder="New profile name (e.g. James)">
      <button onclick="addProfile()">Add profile</button>
    </div>
  </div>

  <div id="profiles"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s, el = document) => el.querySelector(s);
let GENRES = [];

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 3000);
}

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function fmtAge(ms) {
  if (!ms) return 'never';
  const h = (Date.now() - ms) / 3600e3;
  if (h < 1) return `${Math.round(h * 60)} min ago`;
  if (h < 48) return `${Math.round(h)} h ago`;
  return `${Math.round(h / 24)} d ago`;
}

function catalogLine(label, entry) {
  if (!entry) return `${label}: <span style="color:var(--warn)">not generated yet</span>`;
  const src = entry.source === 'gemini' ? 'picked for you' : 'popular picks';
  return `${label}: ${entry.count} titles (${src}, ${fmtAge(entry.generated_at)})`;
}

function render(profiles) {
  const container = $('#profiles');
  // Preserve which sections are open across re-renders (auto-refresh must
  // never yank the page out from under the user)
  const openMap = {};
  const diagMap = {};
  container.querySelectorAll('.card[data-id]').forEach(card => {
    openMap[card.dataset.id] = [...card.querySelectorAll('details')].map(d => d.open);
    const diag = card.querySelector('.diag');
    if (diag && diag.style.display === 'block') diagMap[card.dataset.id] = diag.innerHTML;
  });
  container.innerHTML = profiles.map(p => {
    const installUrl = p.install_url;
    // RPDB is optional — excluded from the required-keys gate
    const keysOk = p.keys_set.trakt_client_id && p.keys_set.trakt_client_secret && p.keys_set.tmdb_api_key && p.keys_set.gemini_api_key;
    const traktKeysOk = p.keys_set.trakt_client_id && p.keys_set.trakt_client_secret;
    const badge = p.trakt_connected
      ? '<span class="badge ok">Trakt connected</span>'
      : (keysOk ? '<span class="badge warn">Trakt not authorized</span>' : '<span class="badge err">Keys missing</span>');
    const rebuilding = p.status.rebuilding ? '<span class="badge warn">rebuilding…</span>' : '';
    return `
    <div class="card" data-id="${p.id}">
      <div class="row">
        <h2>${esc(p.name)}</h2> ${badge} ${rebuilding}
        <div class="grow"></div>
        <button class="ghost" onclick="rebuildNow('${p.id}', this)" ${p.trakt_connected && !p.status.rebuilding ? '' : 'disabled'}>${p.status.rebuilding ? 'Rebuilding…' : 'Rebuild now'}</button>
        <button class="ghost" onclick="diagnose('${p.id}', this)" ${p.trakt_connected ? '' : 'disabled'} title="Check every listed title against your live Trakt watched history">Diagnose</button>
        <button class="danger" onclick="delProfile('${p.id}')">Delete</button>
      </div>
      <div class="status-line">
        ${catalogLine('🎬 Movies', p.status.movie)} &nbsp;·&nbsp; ${catalogLine('📺 Series', p.status.series)}
      </div>
      <div class="diag"></div>

      <details>
        <summary>Trakt — account & authorization ${p.trakt_connected ? '✓ connected' : (traktKeysOk ? '— ready to connect' : '— keys required')}</summary>
        <div class="muted" style="margin-top:8px">Steps: 1) create a Trakt API app while signed in as <b>${esc(p.name)}</b>'s Trakt account, 2) paste both values, 3) Save &amp; Test, 4) Connect.</div>
        <div class="cols">
          <div><label>Client ID <span class="muted">(${p.keys_preview.trakt_client_id || 'not set'})</span>
              <a class="getkey" href="https://app.trakt.tv/settings/advanced?mode=media" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="trakt_client_id" placeholder="leave blank to keep"></div>
          <div><label>Client Secret <span class="muted">(${p.keys_preview.trakt_client_secret || 'not set'})</span>
              <a class="getkey" href="https://app.trakt.tv/settings/advanced?mode=media" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="trakt_client_secret" placeholder="leave blank to keep"></div>
        </div>
        <div style="margin-top:10px" class="row">
          <button onclick="saveKeys('${p.id}')">Save</button>
          <button class="ghost mini" onclick="testKey('${p.id}','trakt',this)">Test</button><span class="tres" data-tres="trakt"></span>
        </div>
        <div class="trakt-flow" style="margin-top:12px; padding-top:10px; border-top:1px solid var(--border)">
          ${p.trakt_connected
            ? `<div class="muted">✓ Authorized${p.trakt_username ? ` as Trakt account <b style="color:var(--ok)">${esc(p.trakt_username)}</b>` : ''}. Token auto-refreshes; expires ${p.trakt_expires_at ? new Date(p.trakt_expires_at).toLocaleDateString() : '—'}.
               ${p.trakt_username ? `<div style="font-size:11px;margin-top:2px">If that isn't ${esc(p.name)}'s own Trakt account, disconnect and re-authorize signed in as ${esc(p.name)} — recommendations are built from this account's history.</div>` : ''}</div>
               <div style="margin-top:8px"><button class="ghost" onclick="disconnectTrakt('${p.id}')">Disconnect</button></div>`
            : `<div><button onclick="connectTrakt('${p.id}')" ${traktKeysOk ? '' : 'disabled'}>Connect Trakt</button>
               <span class="muted"> — sign in as <b>${esc(p.name)}</b>'s Trakt account when prompted${traktKeysOk ? '' : ' (save both keys above first)'}</span></div>
               <div class="flow-status" style="margin-top:10px"></div>`}
        </div>
      </details>

      <details>
        <summary>API keys — TMDB, Gemini &amp; RPDB ${p.keys_set.tmdb_api_key && p.keys_set.gemini_api_key ? '✓' : '— required'}</summary>
        <div class="muted" style="margin-top:8px">Create each key while signed in as <b>${esc(p.name)}</b>'s account on that service.</div>
        <div class="cols">
          <div><label>TMDB API Key <span class="muted">(${p.keys_preview.tmdb_api_key || 'not set'})</span>
              <a class="getkey" href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="tmdb_api_key" placeholder="leave blank to keep"></div>
          <div><label>Gemini API Key <span class="muted">(${p.keys_preview.gemini_api_key || 'not set'})</span>
              <a class="getkey" href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="gemini_api_key" placeholder="leave blank to keep"></div>
          <div><label>RPDB API Key <span class="muted">(optional · ${p.keys_preview.rpdb_api_key || 'not set'})</span>
              <a class="getkey" href="https://ratingposterdb.com/" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="rpdb_api_key" placeholder="leave blank to keep">
            <div class="muted" style="font-size:11px;margin-top:3px">Pre-set with the free-tier key (t0-free-rpdb) — posters show ratings out of the box. Paste a personal key here to upgrade tiers. Applies immediately, no rebuild.</div></div>
          <div><label>MDBList API Key <span class="muted">(for age limits · ${p.keys_preview.mdblist_api_key || 'not set'})</span>
              <a class="getkey" href="https://mdblist.com/preferences/" target="_blank" rel="noopener">get key ↗</a></label>
            <input type="password" data-key="mdblist_api_key" placeholder="leave blank to keep">
            <div class="muted" style="font-size:11px;margin-top:3px">Required only when an age limit is set — used to verify every title's Common Sense Media age rating. Free key: sign in at mdblist.com → Preferences.</div></div>
        </div>
        <div style="margin-top:10px" class="row">
          <button onclick="saveKeys('${p.id}')">Save</button>
          <button class="ghost mini" onclick="testKey('${p.id}','tmdb',this)">Test TMDB</button><span class="tres" data-tres="tmdb"></span>
          <button class="ghost mini" onclick="testKey('${p.id}','gemini',this)">Test Gemini</button><span class="tres" data-tres="gemini"></span>
          <button class="ghost mini" onclick="testKey('${p.id}','rpdb',this)">Test RPDB</button><span class="tres" data-tres="rpdb"></span>
          <button class="ghost mini" onclick="testKey('${p.id}','mdblist',this)">Test MDBList</button><span class="tres" data-tres="mdblist"></span>
        </div>
      </details>

      <details>
        <summary>Filters — min rating ${p.filters.min_rating}, ${p.filters.max_age_years > 0 ? 'last ' + p.filters.max_age_years + ' years' : 'any year'}, ${p.filters.list_size} titles${p.filters.age_limit > 0 ? ', age ' + p.filters.age_limit + '+ limit' : ''}${p.filters.excluded_genres.length ? ', ' + p.filters.excluded_genres.length + ' genres excluded' : ''}</summary>
        <div class="cols">
          <div><label>Minimum rating</label>
            <select data-filter="min_rating">
              ${[0,5,5.5,6,6.5,7,7.5,8,8.5,9].map(v => `<option value="${v}" ${v === p.filters.min_rating ? 'selected' : ''}>${v === 0 ? 'No minimum' : '≥ ' + v.toFixed(1)}</option>`).join('')}
            </select></div>
          <div><label>Released within</label>
            <select data-filter="max_age_years">
              ${[[1,'1 year'],[2,'2 years'],[5,'5 years'],[10,'10 years'],[20,'20 years'],[0,'No limit']].map(([v,l]) => `<option value="${v}" ${v === p.filters.max_age_years ? 'selected' : ''}>${l}</option>`).join('')}
            </select></div>
          <div><label>List size (per catalog)</label>
            <select data-filter="list_size">
              ${[10,15,20,25,30,40].map(v => `<option value="${v}" ${v === p.filters.list_size ? 'selected' : ''}>${v} titles</option>`).join('')}
            </select></div>
          <div><label>Age limit (Common Sense Media)</label>
            <div class="row" style="gap:8px">
              <label style="margin:0;display:flex;align-items:center;gap:6px;color:var(--text);font-size:13px">
                <input type="checkbox" data-filter="age_limit_on" ${p.filters.age_limit > 0 ? 'checked' : ''} onchange="const s=this.closest('.row').querySelector('[data-filter=age_limit]'); s.disabled=!this.checked; s.style.display=this.checked?'':'none'"> Limit to age
              </label>
              <select data-filter="age_limit" style="width:auto;flex:1;${p.filters.age_limit > 0 ? '' : 'display:none'}" ${p.filters.age_limit > 0 ? '' : 'disabled'}>
                ${[[5,'5+ (~G, young kids)'],[6,'6+'],[8,'8+ (~PG)'],[10,'10+'],[12,'12+'],[13,'13+ (~PG-13)'],[15,'15+ (~M)']].map(([v,l]) => `<option value="${v}" ${v === (p.filters.age_limit || 8) ? 'selected' : ''}>${l}</option>`).join('')}
              </select>
            </div>
            <div class="muted" style="font-size:11px;margin-top:3px">Strict: every title is checked against Common Sense Media (via MDBList). Titles CSM hasn't rated are never listed. Requires the MDBList key.</div>
            ${p.filters.age_limit > 0 && !p.keys_set.mdblist_api_key ? '<div style="color:var(--err);font-size:12px;margin-top:4px">⚠ Age limit is on but no MDBList key is set — rebuilds will fail until you add one.</div>' : ''}
          </div>
        </div>
        <label>Excluded genres <span class="muted">(ticked = never recommended)</span></label>
        <div class="genres">
          ${GENRES.map(g => `<label><input type="checkbox" value="${esc(g)}" ${p.filters.excluded_genres.includes(g) ? 'checked' : ''}>${esc(g)}</label>`).join('')}
        </div>
        <div style="margin-top:10px"><button onclick="saveFilters('${p.id}')">Save filters</button>
        <span class="muted"> — applies on next rebuild (or hit Rebuild now)</span></div>
      </details>

      <details>
        <summary>Install in Stremio / Nuvio</summary>
        ${p.external_url_set ? '' : `<div style="color:var(--warn);font-size:12px;margin:6px 0">⚠ EXTERNAL_URL is not set — this link uses the address you opened this page from, which Stremio clients outside your network can't reach. Set the EXTERNAL_URL variable to your public hostname (e.g. your Cloudflare Tunnel URL).</div>`}
        <div class="install">${esc(installUrl)}</div>
        <div style="margin-top:8px" class="row">
          <button class="ghost" onclick="copyText('${esc(installUrl)}')">Copy URL</button>
          <a href="${esc(installUrl.replace(/^https?:\/\//, 'stremio://'))}"><button class="ghost">Open in Stremio</button></a>
        </div>
        <div class="muted" style="margin-top:6px">Paste the URL in Stremio → Addons → Add addon. This link is ${esc(p.name)}'s personal list — don't share it outside the family.</div>
      </details>
    </div>`;
  }).join('') || '<div class="card muted">No profiles yet — add one above.</div>';
  // Restore open sections + diagnose results
  container.querySelectorAll('.card[data-id]').forEach(card => {
    (openMap[card.dataset.id] || []).forEach((wasOpen, i) => {
      const d = card.querySelectorAll('details')[i];
      if (d && wasOpen) d.open = true;
    });
    if (diagMap[card.dataset.id]) {
      const diag = card.querySelector('.diag');
      diag.innerHTML = diagMap[card.dataset.id];
      diag.style.display = 'block';
    }
  });
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load() {
  if (!GENRES.length) GENRES = (await api('/genres')).genres;
  const { profiles } = await api('/profiles');
  render(profiles);
}

async function addProfile() {
  const name = $('#newName').value.trim();
  if (!name) return toast('Enter a name first');
  await api('/profiles', { method: 'POST', body: { name } });
  $('#newName').value = '';
  load();
}

async function delProfile(id) {
  // Name read from the DOM, not interpolated into the onclick attribute —
  // keeps profile names out of inline JS entirely.
  const name = document.querySelector(`[data-id="${id}"] h2`)?.textContent || 'this profile';
  if (!confirm(`Delete profile "${name}"? Their install link stops working immediately.`)) return;
  await api('/profiles/' + id, { method: 'DELETE' });
  load();
}

async function saveKeys(id, silent = false) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const keys = {};
  card.querySelectorAll('[data-key]').forEach(i => { if (i.value.trim()) keys[i.dataset.key] = i.value.trim(); });
  if (Object.keys(keys).length) await api('/profiles/' + id, { method: 'PUT', body: { keys } });
  if (!silent) { dirty = false; toast('Keys saved'); load(); }
}

async function testKey(id, service, btn) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const out = card.querySelector(`[data-tres="${service}"]`);
  btn.disabled = true;
  out.className = 'tres'; out.textContent = 'testing…';
  try {
    await saveKeys(id, true); // persist anything typed but not yet saved
    const r = await api(`/profiles/${id}/test/${service}`, { method: 'POST' });
    out.className = 'tres ' + (r.ok ? 'ok' : 'err');
    out.textContent = r.ok ? `✓ ${r.detail}` : `✗ ${r.error}`;
  } catch (err) {
    out.className = 'tres err';
    out.textContent = '✗ ' + err.message;
  }
  btn.disabled = false;
}

async function saveFilters(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const ageOn = card.querySelector('[data-filter=age_limit_on]').checked;
  const filters = {
    min_rating: parseFloat(card.querySelector('[data-filter=min_rating]').value),
    max_age_years: parseInt(card.querySelector('[data-filter=max_age_years]').value, 10),
    list_size: parseInt(card.querySelector('[data-filter=list_size]').value, 10),
    age_limit: ageOn ? parseInt(card.querySelector('[data-filter=age_limit]').value, 10) : 0,
    excluded_genres: [...card.querySelectorAll('.genres input:checked')].map(i => i.value),
  };
  await api('/profiles/' + id, { method: 'PUT', body: { filters } });
  dirty = false;
  toast('Filters saved — applies on next rebuild');
  load();
}

async function connectTrakt(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const statusEl = card.querySelector('.flow-status');
  try {
    await saveKeys(id, true); // persist anything typed but not yet saved
    const { user_code, verification_url } = await api(`/profiles/${id}/trakt/connect`, { method: 'POST' });
    statusEl.innerHTML = `Go to <a href="${verification_url}" target="_blank" style="color:var(--accent)">${verification_url}</a> and enter:
      <div class="pin">${user_code}</div><div class="muted">Waiting for authorization…</div>`;
    const poll = setInterval(async () => {
      const { connected, flow } = await api(`/profiles/${id}/trakt/status`);
      if (connected) { clearInterval(poll); toast('Trakt connected 🎉'); load(); }
      else if (flow && flow.state === 'error') { clearInterval(poll); statusEl.innerHTML = `<span style="color:var(--err)">${esc(flow.error)}</span>`; }
    }, 3000);
  } catch (err) {
    statusEl.innerHTML = `<span style="color:var(--err)">${esc(err.message)}</span>`;
  }
}

async function disconnectTrakt(id) {
  await api(`/profiles/${id}/trakt/disconnect`, { method: 'POST' });
  load();
}

async function diagnose(id, btn) {
  const card = document.querySelector(`[data-id="${id}"]`);
  const out = card.querySelector('.diag');
  btn.disabled = true; btn.textContent = 'Checking…';
  try {
    const d = await api(`/profiles/${id}/diagnose`);
    const lines = Object.entries(d.catalogs).map(([type, items]) => {
      const flagged = items.filter(i => i.in_trakt_watched);
      const label = type === 'movie' ? '🎬 Movies' : '📺 Series';
      return `<div>${label}: ${items.length} listed, <b style="color:${flagged.length ? 'var(--err)' : 'var(--ok)'}">${flagged.length} flagged as watched on Trakt</b>${flagged.length ? ' — ' + flagged.map(i => esc(i.name)).join(', ') : ''}</div>`;
    });
    out.innerHTML = `
      <div>Trakt account: <b>${esc(d.trakt_username || 'unknown')}</b> · ${d.watched_counts.movies} movies / ${d.watched_counts.shows} shows in watched history</div>
      ${lines.join('')}
      <div class="muted" style="margin-top:6px">Flagged = addon bug, please report. If your player shows a watched tick on a title that is NOT flagged here, that play never reached this Trakt account — check the player's Trakt integration and which account it's signed into.</div>`;
    out.style.display = 'block';
  } catch (err) {
    out.textContent = 'Diagnose failed: ' + err.message;
    out.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Diagnose';
}

async function rebuildNow(id, btn) {
  // Standard async-action pattern: disable + progress label while running,
  // transient result state on completion, then revert to the idle state.
  btn.disabled = true;
  btn.textContent = 'Rebuilding…';
  try {
    const { results } = await api(`/profiles/${id}/rebuild`, { method: 'POST' });
    const allOk = Object.values(results).every(r => r.ok);
    const parts = Object.entries(results).map(([t, r]) => `${t}: ${r.ok ? r.count + ' titles ✓' : '✗ ' + r.error}`);
    toast(parts.join(' · '));
    btn.textContent = allOk ? '✓ Rebuilt' : '⚠ Partial — see message';
  } catch (err) {
    toast('Rebuild failed: ' + err.message);
    btn.textContent = '✗ Failed';
  }
  setTimeout(load, 2500); // re-render from server state -> "Rebuild now", enabled
}

function copyText(t) { navigator.clipboard.writeText(t).then(() => toast('Copied')); }

// Auto-refresh keeps status lines fresh, but must NEVER interrupt the user:
// it skips whenever there is unsaved input (typing, ticking checkboxes) or a
// Trakt authorization in progress (PIN on screen).
let dirty = false;
document.addEventListener('input', e => { if (e.target.closest('#profiles')) dirty = true; });

function flowActive() {
  return [...document.querySelectorAll('.flow-status')].some(el => el.textContent.trim() !== '');
}

load();
setInterval(() => { if (!dirty && !flowActive()) load(); }, 30000);
</script>
</body>
</html>
